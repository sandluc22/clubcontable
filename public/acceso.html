<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso - Club Contable</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  margin: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.logo {
  text-align: center;
  margin-bottom: 30px;
}
.logo h1 {
  font-size: 24px;
  color: #302b63;
}
.logo span {
  color: #4CAF50;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  margin-bottom: 6px;
  color: #333;
  font-weight: 600;
  font-size: 14px;
}
.form-group input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid #e0e0e0;
  border-radius: 10px;
  font-size: 16px;
  transition: border-color 0.3s;
  outline: none;
}
.form-group input:focus {
  border-color: #302b63;
}
.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #302b63, #4CAF50);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
}
.btn-login:hover { transform: translateY(-2px); opacity: 0.95; }
.btn-login:active { transform: translateY(0); }
.toast {
  display: none;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 20px;
  text-align: center;
  font-weight: 500;
  font-size: 14px;
}
.toast.error { background: #ffebee; color: #c62828; }
.toast.ok { background: #e8f5e9; color: #2e7d32; }
.toast.info { background: #e3f2fd; color: #1565c0; }
.loading {
  display: none;
  text-align: center;
  margin-top: 10px;
  color: #666;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>📊 Club <span>Contable</span></h1>
    <p style="color:#666;font-size:14px;margin-top:5px">Acceso al Gestor de Tareas</p>
  </div>
  <div id="loginToast" class="toast"></div>
  <form id="loginForm">
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="loginEmail" placeholder="tu@correo.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Ingresar</button>
    <div class="loading" id="loadingText">⏳ Ingresando...</div>
  </form>
  <p style="text-align:center;margin-top:20px;font-size:13px;color:#999">
    <a href="https://clubcontable.com" style="color:#302b63">← Volver a Club Contable</a>
  </p>
</div>

<script>
const API = 'https://clubcontable-api.crecimientofinancieroglobal.workers.dev';
const loginForm = document.getElementById('loginForm');
const loginBtn = document.getElementById('loginBtn');
const loadingText = document.getElementById('loadingText');
const toast = document.getElementById('loginToast');

function showToast(msg, tipo) {
  toast.textContent = msg;
  toast.style.display = 'block';
  toast.className = 'toast ' + tipo;
  setTimeout(() => toast.style.display = 'none', 5000);
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  
  if (!email || !pass) {
    return showToast('Completa todos los campos', 'error');
  }
  
  loginBtn.style.display = 'none';
  loadingText.style.display = 'block';
  
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    
    const d = await r.json();
    
    if (d.ok && d.token) {
      localStorage.setItem('token', d.token);
      localStorage.setItem('user', JSON.stringify(d.user || {}));
      showToast('✅ Ingreso exitoso. Redirigiendo...', 'ok');
      setTimeout(() => {
        window.location.href = 'https://www.clubcontable.com/#panel';
      }, 1000);
    } else {
      showToast(d.error || '❌ Credenciales inválidas', 'error');
      loginBtn.style.display = 'block';
      loadingText.style.display = 'none';
    }
  } catch (err) {
    showToast('❌ Error de conexión: ' + err.message, 'error');
    loginBtn.style.display = 'block';
    loadingText.style.display = 'none';
  }
});
</script>
</body>
</html>
