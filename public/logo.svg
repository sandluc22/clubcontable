<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Fondo azul oscuro -->
  <rect width="120" height="120" rx="24" fill="#1e3a5f"/>
  
  <!-- Palo vertical de la T -->
  <rect x="55" y="28" width="10" height="64" rx="2" fill="#f5a623"/>
  
  <!-- Línea horizontal de la T -->
  <rect x="12" y="28" width="96" height="10" rx="2" fill="#f5a623"/>
  
  <!-- C izquierda más pegada al palo -->
  <text x="42" y="82" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#f5a623" text-anchor="middle">C</text>

  <!-- $ más arriba, muy poco -->
  <text x="60" y="84" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#f5a623" text-anchor="middle">$</text>

  <!-- C derecha más pegada al palo -->
  <text x="78" y="82" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#f5a623" text-anchor="middle">C</text>
</svg>