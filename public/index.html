<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Club Contable</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f0f2f5; min-height: 100vh; }
.hidden { display: none !important; }
/* Auth */
#authContainer { max-width: 400px; margin: 80px auto; background: white; border-radius: 16px; padding: 40px 30px; box-shadow: 0 2px 12px rgba(0,0,0,.1); }
#authContainer h1 { text-align: center; color: #1a73e8; font-size: 28px; margin-bottom: 8px; }
#authContainer p { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
#authContainer input { width: 100%; padding: 14px 16px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
#authContainer button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
#authContainer button:disabled { opacity: .6; }
.error { color: #d93025; font-size: 13px; margin-bottom: 8px; text-align: center; }
/* App Layout */
#appContainer { max-width: 900px; margin: 0 auto; padding: 0; }
.header { background: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 10; }
.header h2 { color: #1a73e8; font-size: 20px; }
.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.header-user { font-size: 14px; color: #333; font-weight: 500; }
.empresa-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #f8f9fa; cursor: pointer; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-primary { background: #1a73e8; color: white; }
.btn-success { background: #1e8e3e; color: white; }
.btn-warning { background: #f9ab00; color: white; }
.btn-danger { background: #d93025; color: white; }
.btn-outline { background: white; border: 1px solid #ddd; color: #333; }
.btn-sm { padding: 6px 10px; font-size: 12px; }
.header-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
/* Content */
.content { padding: 16px; }
.add-btn-wrap { margin-bottom: 16px; }
.add-btn-wrap button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
/* Task Card */
.task-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border-left: 4px solid #1a73e8; }
.task-card.completada { border-left-color: #1e8e3e; opacity: .75; }
.con-nota { border-left-color: #e37400 !important; box-shadow: 0 0 0 2px #f9ab00, 0 1px 4px rgba(0,0,0,.1); }
.task-card .task-title { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.task-card .task-meta { font-size: 13px; color: #666; margin-bottom: 4px; }
.task-card .task-meta span { display: inline-block; margin-right: 12px; }
.task-card .task-empresa { display: inline-block; background: #e8f0fe; color: #1a73e8; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.task-card .task-desc { font-size: 14px; color: #444; margin-top: 6px; white-space: pre-wrap; }
.task-card .task-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.active { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal h3 { margin-bottom: 16px; color: #1a1a1a; font-size: 18px; }
.modal input, .modal select, .modal textarea { width: 100%; padding: 12px 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
.modal textarea { min-height: 80px; resize: vertical; }
.modal .btn-wrap { display: flex; gap: 8px; margin-top: 8px; }
.modal .btn-wrap button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 14px; }
.modal .btn-wrap .btn-cancel { background: #f0f0f0; }
.modal .btn-wrap .btn-save { background: #1a73e8; color: white; }
/* Mobile */
@media (max-width: 600px) {
  #authContainer { margin: 40px 16px; padding: 30px 20px; }
  .header { flex-direction: column; gap: 8px; padding: 12px 16px; }
  .header-right { width: 100%; flex-direction: column; align-items: stretch; }
  .empresa-select { width: 100%; }
  .header-buttons { width: 100%; justify-content: center; }
  .modal { padding: 20px; }
}
/* Admin Panel */
.admin-section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.admin-section h3 { color: #1a1a1a; margin-bottom: 16px; font-size: 17px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #f8f9fa; font-weight: 600; color: #444; }
/* Sin tareas */
.empty-state { text-align: center; padding: 60px 20px; color: #888; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; }
</style>
</head>
<body>

<!-- Auth -->
<div id="authContainer">
  <h1>🏢 Club Contable</h1>
  <p>Ingresa con tu cuenta</p>
  <div id="loginError" class="error hidden"></div>
  <input type="email" id="loginEmail" placeholder="Correo electrónico" autocomplete="email">
  <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
  <button id="loginBtn" onclick="login()">Ingresar</button>
</div>

<!-- App -->
<div id="appContainer" class="hidden">
  <div class="header">
    <h2>🏢 Club Contable</h2>
    <div class="header-right">
      <span class="header-user" id="userName"></span>
      <select id="empresaSelect" class="empresa-select" onchange="cambiarEmpresa()">
        <option value="">Todas las empresas</option>
      </select>
      <div class="header-buttons" id="adminButtons" class="hidden">
        <button class="btn btn-warning btn-sm" onclick="toggleAdmin()">⚙️ Admin</button>
        <button class="btn btn-outline btn-sm" onclick="toggleReportes()">📊 Reportes</button>
      </div>
      <button class="btn btn-outline btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <!-- Admin Panel -->
    <div id="adminPanel" class="hidden">
      <div class="admin-section">
        <h3>📋 Usuarios</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <input type="email" id="newUserEmail" placeholder="Email" style="flex:2;min-width:150px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <input type="password" id="newUserPass" placeholder="Contraseña" style="flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <input type="text" id="newUserName" placeholder="Nombre" style="flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <input type="number" id="newUserMaxEmp" placeholder="Max empresas" value="3" style="flex:0.5;min-width:80px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <button class="btn btn-primary" onclick="crearUsuario()">➕ Añadir</button>
        </div>
        <div id="usuariosList"></div>
      </div>
      <div class="admin-section">
        <h3>🏢 Empresas</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <input type="text" id="newEmpresaName" placeholder="Nombre empresa" style="flex:2;min-width:150px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <select id="newEmpresaUser" style="flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:8px"><option value="">Seleccionar usuario</option></select>
          <button class="btn btn-primary" onclick="crearEmpresa()">➕ Crear</button>
        </div>
        <div id="empresasList"></div>
      </div>
      <div class="admin-section">
        <h3>📂 Categorías</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <input type="text" id="newCatName" placeholder="Nombre" style="flex:2;min-width:150px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <button class="btn btn-primary" onclick="crearCategoria()">➕ Añadir</button>
        </div>
        <div id="categoriasList"></div>
      </div>
      <div class="admin-section">
        <h3>📂 Subcategorías</h3>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <select id="newSubcatCat" style="flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:8px"><option value="">Categoría</option></select>
          <input type="text" id="newSubcatName" placeholder="Nombre" style="flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:8px">
          <button class="btn btn-primary" onclick="crearSubcategoria()">➕ Añadir</button>
        </div>
        <div id="subcategoriasList"></div>
      </div>
    </div>

    <!-- Reportes -->
    <div id="reportesPanel" class="hidden">
      <div class="admin-section">
        <h3>📊 Reportes</h3>
        <div id="reportesContent"></div>
      </div>
    </div>

    <!-- Tareas -->
    <div id="tareasPanel">
      <div class="add-btn-wrap">
        <button onclick="mostrarModalTarea()">➕ Nueva Tarea</button>
      </div>
      <div id="tareasList"></div>
    </div>
  </div>
</div>

<!-- Modal Tarea -->
<div class="modal-overlay" id="modalTarea">
  <div class="modal">
    <h3 id="modalTitulo">Nueva Tarea</h3>
    <input type="text" id="tareaTitulo" placeholder="Título">
    <textarea id="tareaDesc" placeholder="Descripción"></textarea>
    <input type="date" id="tareaFecha">
    <select id="tareaUsuario"><option value="">Asignar a...</option></select>
    <select id="tareaCategoria"><option value="">Categoría</option></select>
    <select id="tareaSubcategoria"><option value="">Subcategoría</option></select>
    <select id="tareaEmpresa"><option value="">Empresa</option></select>
    <div class="btn-wrap">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" id="btnGuardarTarea" onclick="guardarTarea()">Guardar</button>
    </div>
    <input type="hidden" id="tareaId" value="">
  </div>
</div>

<script>
// ===== CONFIG =====
const API = 'https://clubcontable-api.crecimientofinancieroglobal.workers.dev';

// ===== STATE =====
let token = localStorage.getItem('cc_token') || '';
let user = JSON.parse(localStorage.getItem('cc_user') || 'null');
let empresas = JSON.parse(localStorage.getItem('cc_empresas') || '[]');
let empresaActual = localStorage.getItem('cc_empresa_actual') || '';
// Cache categorias/subcategorias
let categorias = [];
let subcategorias = [];
let usuarios = [];

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  if (token && user) { mostrarApp(); } else { mostrarAuth(); }
});

// ===== AUTH =====
function mostrarAuth() { document.getElementById('authContainer').classList.remove('hidden'); document.getElementById('appContainer').classList.add('hidden'); }
function mostrarApp() { document.getElementById('authContainer').classList.add('hidden'); document.getElementById('appContainer').classList.remove('hidden'); document.getElementById('userName').textContent = user?.nombre || ''; if (user?.rol === 'admin') document.getElementById('adminButtons').classList.remove('hidden'); cargarEmpresas(); cargarDatos(); }

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!email || !password) { errorEl.textContent = 'Ingresa email y contraseña'; errorEl.classList.remove('hidden'); return; }
  errorEl.classList.add('hidden');
  btn.disabled = true;
  try {
    const res = await fetch(API + '/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
    const data = await res.json();
    if (!data.ok) { errorEl.textContent = data.error || 'Error al ingresar'; errorEl.classList.remove('hidden'); btn.disabled = false; return; }
    token = data.token; user = data.user; empresas = data.empresas || [];
    localStorage.setItem('cc_token', token); localStorage.setItem('cc_user', JSON.stringify(user)); localStorage.setItem('cc_empresas', JSON.stringify(empresas));
    document.getElementById('loginEmail').value = ''; document.getElementById('loginPassword').value = '';
    mostrarApp();
  } catch(e) { errorEl.textContent = 'Error de conexión'; errorEl.classList.remove('hidden'); }
  btn.disabled = false;
}

function logout() {
  fetch(API + '/api/logout', { method:'POST', headers:{'Authorization':'Bearer '+token} });
  localStorage.removeItem('cc_token'); localStorage.removeItem('cc_user'); localStorage.removeItem('cc_empresas'); localStorage.removeItem('cc_empresa_actual');
  token = ''; user = null; empresas = []; empresaActual = '';
  mostrarAuth();
}

// ===== EMPRESAS =====
function cargarEmpresas() {
  const sel = document.getElementById('empresaSelect');
  sel.innerHTML = '<option value="">Todas las empresas</option>';
  empresas.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id; opt.textContent = e.nombre;
    if (e.id == empresaActual) opt.selected = true;
    sel.appendChild(opt);
  });
  // Actualizar select en modal
  const selModal = document.getElementById('tareaEmpresa');
  selModal.innerHTML = '<option value="">Sin empresa</option>';
  empresas.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id; opt.textContent = e.nombre;
    if (e.id == empresaActual) opt.selected = true;
    selModal.appendChild(opt);
  });
}

function cambiarEmpresa() {
  empresaActual = document.getElementById('empresaSelect').value;
  localStorage.setItem('cc_empresa_actual', empresaActual);
  cargarTareas();
}

// ===== DATOS =====
async function cargarDatos() {
  await Promise.all([cargarTareas(), cargarCategorias(), cargarSubcategorias(), cargarUsuariosAdmin()]);
}

async function cargarTareas() {
  const cont = document.getElementById('tareasList');
  cont.innerHTML = '<div style="text-align:center;padding:40px;color:#888">⏳ Cargando...</div>';
  try {
    let url = API + '/api/tareas';
    if (empresaActual) url += '?empresa_id=' + empresaActual;
    const res = await fetch(url, { headers:{'Authorization':'Bearer '+token} });
    const tareas = await res.json();
    if (!Array.isArray(tareas)) { cont.innerHTML = '<div class="empty-state"><p>Error al cargar</p></div>'; return; }
    if (tareas.length === 0) { cont.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No hay tareas aún</p></div>'; return; }
    cont.innerHTML = tareas.map(t => `
      <div class="task-card ${t.ok ? 'completada' : ''}${t.notas ? ' con-nota' : ''}">
        <div class="task-title">${escapeHtml(t.titulo)} ${t.ok ? '✅' : ''}</div>
        <div class="task-meta">
          ${t.empresa_nombre ? '<span class="task-empresa">'+escapeHtml(t.empresa_nombre)+'</span>' : ''}
          <span>👤 ${escapeHtml(t.usuario_nombre || '')}</span>
          <span>📁 ${escapeHtml(t.categoria_nombre || '')}${t.subcategoria_nombre ? ' > '+escapeHtml(t.subcategoria_nombre) : ''}</span>
          ${t.fecha_limite ? '<span>📅 '+t.fecha_limite+'</span>' : ''}
        </div>
        ${t.descripcion ? '<div class="task-desc">'+escapeHtml(t.descripcion)+'</div>' : ''}
        ${t.notas ? '<div class="task-desc" style="margin-top:6px;padding:8px;background:#fef7e0;border-radius:6px;font-size:13px;color:#666">📝 '+escapeHtml(t.notas)+'</div>' : ''}
        <div class="task-actions">
          ${!t.ok ? '<button class="btn btn-success btn-sm" onclick="completarTarea('+t.id+')">✅ Completar</button>' : ''}
          <button class="btn btn-outline btn-sm" onclick="agregarNota('+t.id+')">📝 Nota</button>
          ${usuario?.rol === 'admin' ? '<button class="btn btn-outline btn-sm" onclick="editarTarea('+t.id+')">✏️ Editar</button><button class="btn btn-danger btn-sm" onclick="eliminarTarea('+t.id+')">🗑️</button>' : ''}
        </div>
      </div>
    `).join('');
  } catch(e) { cont.innerHTML = '<div class="empty-state"><p>Error de conexión</p></div>'; }
}

async function cargarCategorias() {
  try {
    let url = API + '/api/categorias';
    if (empresaActual) url += '?empresa_id=' + empresaActual;
    const res = await fetch(url, { headers:{'Authorization':'Bearer '+token} });
    categorias = await res.json();
    // Cargar select admin
    const sel = document.getElementById('newSubcatCat');
    sel.innerHTML = '<option value="">Categoría</option>';
    categorias.forEach(c => { const o = document.createElement('option'); o.value=c.id; o.textContent=c.nombre; sel.appendChild(o); });
    // Select tarea
    const selT = document.getElementById('tareaCategoria');
    selT.innerHTML = '<option value="">Categoría</option>';
    categorias.forEach(c => { const o = document.createElement('option'); o.value=c.id; o.textContent=c.nombre; selT.appendChild(o); });
  } catch(e) {}
}

async function cargarSubcategorias() {
  try {
    const res = await fetch(API + '/api/subcategorias', { headers:{'Authorization':'Bearer '+token} });
    subcategorias = await res.json();
  } catch(e) {}
}

async function cargarUsuariosAdmin() {
  // Cargar usuarios para selector de tareas (todos pueden ver)
  try {
    const res = await fetch(API + '/api/usuarios', { headers:{'Authorization':'Bearer '+token} });
    usuarios = await res.json();
    // Select usuario en modal tarea
    const sel = document.getElementById('tareaUsuario');
    sel.innerHTML = '<option value="">Asignar a...</option>';
    usuarios.forEach(u => { const o = document.createElement('option'); o.value=u.id; o.textContent=u.nombre+' ('+u.email+')'; if (u.id == user.id) o.selected = true; sel.appendChild(o); });
    // Select en admin empresas (solo admin)
    if (user?.rol === 'admin') {
      const selA = document.getElementById('newEmpresaUser');
      selA.innerHTML = '<option value="">Seleccionar usuario</option>';
      usuarios.forEach(u => { const o = document.createElement('option'); o.value=u.id; o.textContent=u.nombre+' ('+u.email+')'; selA.appendChild(o); });
    }
  } catch(e) {}
}

// ===== TAREAS =====
function mostrarModalTarea(data) {
  document.getElementById('modalTitulo').textContent = data ? 'Editar Tarea' : 'Nueva Tarea';
  document.getElementById('tareaId').value = data?.id || '';
  document.getElementById('tareaTitulo').value = data?.titulo || '';
  document.getElementById('tareaDesc').value = data?.descripcion || '';
  document.getElementById('tareaFecha').value = data?.fecha_limite || '';
  if (data?.usuario_id) document.getElementById('tareaUsuario').value = data.usuario_id;
  if (data?.categoria_id) document.getElementById('tareaCategoria').value = data.categoria_id;
  if (data?.subcategoria_id) document.getElementById('tareaSubcategoria').value = data.subcategoria_id;
  if (data?.empresa_id) document.getElementById('tareaEmpresa').value = data.empresa_id;
  else if (empresaActual) document.getElementById('tareaEmpresa').value = empresaActual;
  document.getElementById('modalTarea').classList.add('active');
  // Actualizar subcategorías según categoría
  actualizarSubcategorias(document.getElementById('tareaCategoria').value);
}

function cerrarModal() { document.getElementById('modalTarea').classList.remove('active'); }

async function guardarTarea() {
  const id = document.getElementById('tareaId').value;
  const titulo = document.getElementById('tareaTitulo').value.trim();
  if (!titulo) return alert('El título es obligatorio');
  const body = {
    titulo,
    descripcion: document.getElementById('tareaDesc').value.trim(),
    fecha_limite: document.getElementById('tareaFecha').value || null,
    usuario_id: parseInt(document.getElementById('tareaUsuario').value) || user.id,
    categoria_id: parseInt(document.getElementById('tareaCategoria').value) || null,
    subcategoria_id: parseInt(document.getElementById('tareaSubcategoria').value) || null,
    empresa_id: parseInt(document.getElementById('tareaEmpresa').value) || null
  };
  try {
    if (id) {
      await fetch(API + '/api/tareas/' + id, { method:'PATCH', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify(body) });
    } else {
      await fetch(API + '/api/tareas', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify(body) });
    }
    cerrarModal(); cargarTareas();
  } catch(e) { alert('Error al guardar'); }
}

async function completarTarea(id) {
  await fetch(API + '/api/tareas/' + id, { method:'PATCH', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({ok:true}) });
  cargarTareas();
}

async function agregarNota(id) {
  const nota = prompt('Añadir nota/observación:');
  if (nota !== null) {
    await fetch(API + '/api/tareas/' + id, { method:'PATCH', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({notas: nota.trim()}) });
    cargarTareas();
  }
}

async function editarTarea(id) {
  const res = await fetch(API + '/api/tareas?', { headers:{'Authorization':'Bearer '+token} });
  const tareas = await res.json();
  const t = tareas.find(t => t.id === id);
  if (t) mostrarModalTarea(t);
}

async function eliminarTarea(id) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  await fetch(API + '/api/tareas/' + id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} });
  cargarTareas();
}

// ===== CATEGORIA SUBCATEGORIA RELOAD =====
document.getElementById('tareaCategoria')?.addEventListener('change', function() {
  actualizarSubcategorias(this.value);
});
function actualizarSubcategorias(catId) {
  const sel = document.getElementById('tareaSubcategoria');
  sel.innerHTML = '<option value="">Subcategoría</option>';
  subcategorias.filter(s => !catId || s.categoria_id == catId).forEach(s => {
    const o = document.createElement('option'); o.value=s.id; o.textContent=s.nombre; sel.appendChild(o);
  });
}

// ===== ADMIN =====
function toggleAdmin() {
  const p = document.getElementById('adminPanel');
  const r = document.getElementById('reportesPanel');
  p.classList.toggle('hidden');
  r.classList.add('hidden');
  if (!p.classList.contains('hidden')) { cargarUsuariosAdmin(); cargarAdminEmpresas(); cargarAdminCategorias(); cargarAdminSubcategorias(); }
}

function toggleReportes() {
  const r = document.getElementById('reportesPanel');
  const a = document.getElementById('adminPanel');
  a.classList.add('hidden');
  r.classList.toggle('hidden');
  if (!r.classList.contains('hidden')) cargarReportes();
}

async function cargarAdminEmpresas() {
  try {
    const res = await fetch(API + '/api/empresas', { headers:{'Authorization':'Bearer '+token} });
    const emps = await res.json();
    document.getElementById('empresasList').innerHTML = emps.length ? emps.map(e => '<div style="padding:8px 0;border-bottom:1px solid #eee">🏢 '+escapeHtml(e.nombre)+ (e.descripcion ? ' — '+escapeHtml(e.descripcion) : '') +'</div>').join('') : '<p style="color:#888">Sin empresas</p>';
  } catch(e) {}
}

async function cargarAdminCategorias() {
  try {
    const res = await fetch(API + '/api/categorias', { headers:{'Authorization':'Bearer '+token} });
    const cats = await res.json();
    document.getElementById('categoriasList').innerHTML = cats.length ? cats.map(c => `
      <div style="padding:8px 0;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between">
        <span>📂 ${escapeHtml(c.nombre)}</span>
        <div>
          <button class="btn btn-outline btn-sm" onclick="editarCategoria(${c.id},'${escapeHtml(c.nombre)}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="borrarCategoria(${c.id},'${escapeHtml(c.nombre)}')">🗑️</button>
        </div>
      </div>`).join('') : '<p style="color:#888">Sin categorías</p>';
  } catch(e) {}
}

function editarCategoria(id, nombre) {
  const nuevo = prompt('Nuevo nombre para la categoría:', nombre);
  if (nuevo && nuevo.trim() && nuevo !== nombre) {
    fetch(API + '/api/categorias/' + id, { method:'PUT', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({nombre: nuevo.trim()}) })
      .then(() => { cargarAdminCategorias(); cargarCategorias(); })
      .catch(() => alert('Error al editar'));
  }
}

function borrarCategoria(id, nombre) {
  if (!confirm('¿Eliminar categoría "' + nombre + '"?\nSe borrarán también sus subcategorías.')) return;
  fetch(API + '/api/categorias/' + id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} })
    .then(() => { cargarAdminCategorias(); cargarSubcategorias(); cargarCategorias(); })
    .catch(() => alert('Error al borrar'));
}

async function crearUsuario() {
  const email = document.getElementById('newUserEmail').value.trim();
  const password = document.getElementById('newUserPass').value.trim();
  const nombre = document.getElementById('newUserName').value.trim();
  const maxEmpresas = parseInt(document.getElementById('newUserMaxEmp').value) || 3;
  if (!email || !password || !nombre) return alert('Completa todos los campos');
  await fetch(API + '/api/usuarios', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({email, password, nombre, max_empresas: maxEmpresas}) });
  document.getElementById('newUserEmail').value=''; document.getElementById('newUserPass').value=''; document.getElementById('newUserName').value='';
  cargarUsuariosAdmin();
}

async function crearEmpresa() {
  const nombre = document.getElementById('newEmpresaName').value.trim();
  const usuario_id = parseInt(document.getElementById('newEmpresaUser').value) || null;
  if (!nombre) return alert('Nombre de empresa requerido');
  await fetch(API + '/api/empresas', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({nombre, usuario_id}) });
  document.getElementById('newEmpresaName').value='';
  cargarAdminEmpresas();
  // Recargar empresas del usuario actual
  const res = await fetch(API + '/api/empresas', { headers:{'Authorization':'Bearer '+token} });
  empresas = await res.json();
  localStorage.setItem('cc_empresas', JSON.stringify(empresas));
  cargarEmpresas();
}

async function crearCategoria() {
  const nombre = document.getElementById('newCatName').value.trim();
  if (!nombre) return alert('Nombre de categoría requerido');
  await fetch(API + '/api/categorias', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({nombre}) });
  document.getElementById('newCatName').value='';
  cargarAdminCategorias();
  cargarCategorias();
}

async function crearSubcategoria() {
  const nombre = document.getElementById('newSubcatName').value.trim();
  const categoria_id = document.getElementById('newSubcatCat').value;
  if (!nombre || !categoria_id) return alert('Completa todos los campos');
  await fetch(API + '/api/subcategorias', { method:'POST', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({nombre, categoria_id: parseInt(categoria_id)}) });
  document.getElementById('newSubcatCat').value='';
  document.getElementById('newSubcatName').value='';
  cargarSubcategorias();
  cargarAdminSubcategorias();
}

async function cargarAdminSubcategorias() {
  // Las subcategorias ya no se muestran en lista plana, se ven dentro de categorias en cargarAdminCategorias
}}

function editarSubcategoria(id, nombre) {
  const nuevo = prompt('Nuevo nombre:', nombre);
  if (nuevo && nuevo.trim() && nuevo !== nombre) {
    fetch(API + '/api/subcategorias/' + id, { method:'PUT', headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token}, body:JSON.stringify({nombre: nuevo.trim()}) })
      .then(() => { cargarSubcategorias(); cargarAdminSubcategorias(); })
      .catch(() => alert('Error al editar'));
  }
}

function borrarSubcategoria(id, nombre) {
  if (!confirm('¿Eliminar subcategoría "' + nombre + '"?')) return;
  fetch(API + '/api/subcategorias/' + id, { method:'DELETE', headers:{'Authorization':'Bearer '+token} })
    .then(() => { cargarSubcategorias(); cargarAdminSubcategorias(); })
    .catch(() => alert('Error al borrar'));
}

// ===== REPORTES =====
async function cargarReportes() {
  const cont = document.getElementById('reportesContent');
  try {
    let url = API + '/api/reportes';
    if (empresaActual) url += '?empresa_id=' + empresaActual;
    const res = await fetch(url, { headers:{'Authorization':'Bearer '+token} });
    const tareas = await res.json();
    if (!Array.isArray(tareas) || !tareas.length) { cont.innerHTML = '<p>No hay tareas</p>'; return; }
    const pendientes = tareas.filter(t=>!t.ok);
    const completadas = tareas.filter(t=>t.ok);
    const vencidas = pendientes.filter(t => t.fecha_limite && t.fecha_limite < new Date().toISOString().split('T')[0]);
    cont.innerHTML = `
        <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <div style="flex:1;min-width:120px;padding:16px;background:#e8f0fe;border-radius:10px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:#1a73e8">${tareas.length}</div>
            <div style="font-size:13px;color:#666">Total tareas</div>
          </div>
          <div style="flex:1;min-width:120px;padding:16px;background:#fef7e0;border-radius:10px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:#f9ab00">${pendientes.length}</div>
            <div style="font-size:13px;color:#666">Pendientes</div>
          </div>
          <div style="flex:1;min-width:120px;padding:16px;background:#e6f4ea;border-radius:10px;text-align:center">
            <div style="font-size:24px;font-weight:700;color:#1e8e3e">${completadas.length}</div>
            <div style="font-size:13px;color:#666">Completadas</div>
          </div>
        </div>
        ${vencidas.length > 0 ? `<div style="padding:12px;background:#fce8e6;border-radius:8px;margin-bottom:12px;color:#d93025;font-weight:500">⚠️ ${vencidas.length} tarea(s) vencida(s)</div>` : ''}
        <hr style="margin:12px 0">
        <table>
          <tr><th>Tarea</th><th>Empresa</th><th>Usuario</th><th>Fecha</th><th>Estado</th></tr>
          ${tareas.map(t => `<tr${!t.ok && t.fecha_limite && t.fecha_limite < new Date().toISOString().split('T')[0] ? ' style="background:#fce8e6"' : ''}>
            <td>${escapeHtml(t.titulo)}</td>
            <td>${escapeHtml(t.empresa_nombre||'—')}</td>
            <td>${escapeHtml(t.usuario_nombre||'—')}</td>
            <td>${t.fecha_limite||'—'}</td>
            <td>${t.ok ? '✅' : '⏳'}</td>
          </tr>`).join('')}
        </table>
      `;;
  } catch(e) { cont.innerHTML = '<p>Error al cargar reportes</p>'; }
}

// ===== UTILS =====
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
