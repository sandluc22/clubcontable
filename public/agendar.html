<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar cita · Club Contable</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #1e293b; border-radius: 16px; padding: 30px; width: 100%; max-width: 460px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.card h1 { font-size: 22px; color: white; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
.card p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
.fg { margin-bottom: 16px; }
.fg label { display: block; font-size: 13px; color: #cbd5e1; margin-bottom: 5px; font-weight: 600; }
.fg input, .fg textarea, .fg select { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #334155;
  border-radius: 8px; color: white; font-size: 15px; outline: none; transition: border .2s; }
.fg input:focus, .fg textarea:focus, .fg select:focus { border-color: #2563eb; }
.fg textarea { resize: vertical; min-height: 50px; font-family: inherit; }
.row { display: flex; gap: 10px; }
.row .fg { flex: 1; }
.btn { width: 100%; padding: 13px; background: #2563eb; color: white; border: none; border-radius: 8px;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: background .2s; }
.btn:hover { background: #1d4ed8; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
#status { margin-top: 14px; text-align: center; font-size: 14px; font-weight: 600; min-height: 24px; }
.success { color: #22c55e; }
.error { color: #ef4444; }
.required { color: #ef4444; }
small { color: #64748b; font-size: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>📅 Agendar cita</h1>
  <p>Completa los datos y elige el mejor día para ti. Te confirmaremos por WhatsApp o email.</p>

  <div class="fg">
    <label>Nombre completo <span class="required">*</span></label>
    <input id="name" placeholder="Ej: Carlos García">
  </div>

  <div class="fg">
    <label>Email <span class="required">*</span></label>
    <input id="email" type="email" placeholder="carlos@email.com">
  </div>

  <div class="fg">
    <label>Teléfono (WhatsApp) <span class="required">*</span></label>
    <input id="phone" type="tel" placeholder="+57 300 123 4567">
    <small>Para enviarte la confirmación y el recordatorio</small>
  </div>

  <div class="row">
    <div class="fg">
      <label>Fecha <span class="required">*</span></label>
      <input id="date" type="date">
    </div>
    <div class="fg">
      <label>Hora <span class="required">*</span></label>
      <input id="time" type="time">
    </div>
  </div>

  <div class="fg">
    <label>Motivo de la cita (opcional)</label>
    <textarea id="reason" rows="2" placeholder="Ej: Asesoría contable inicial"></textarea>
  </div>

  <button class="btn" id="btnSubmit" onclick="enviarCita()">📅 Solicitar cita</button>

  <div id="status"></div>
</div>

<script>
async function enviarCita() {
  const data = {
    cliente_nombre: document.getElementById('name').value.trim(),
    cliente_email: document.getElementById('email').value.trim(),
    cliente_telefono: document.getElementById('phone').value.trim(),
    fecha: document.getElementById('date').value,
    hora: document.getElementById('time').value,
    motivo: document.getElementById('reason').value.trim()
  };

  const status = document.getElementById('status');
  const btn = document.getElementById('btnSubmit');

  // Validar
  if (!data.cliente_nombre || !data.cliente_email || !data.cliente_telefono || !data.fecha || !data.hora) {
    status.className = 'error';
    status.textContent = '❌ Completa todos los campos obligatorios';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';
  status.textContent = '';

  try {
    const r = await fetch('https://clubcontable-api.crecimientofinancieroglobal.workers.dev/api/citas', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const res = await r.json();
    if (!res.success && !res.ok) throw new Error(res.error || 'Error al crear la cita');

    status.className = 'success';
    status.textContent = '✅ ¡Cita solicitada! Te confirmaremos por WhatsApp o email.';

    // Limpiar form
    ['name','email','phone','date','time','reason'].forEach(id => document.getElementById(id).value = '');
  } catch(e) {
    status.className = 'error';
    status.textContent = '❌ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '📅 Solicitar cita';
  }
}
</script>
</body>
</html>
